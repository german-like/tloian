<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ホーム</title>
  <!-- ICON -->
  <link rel="shortcut icon" href="ファイル名.ico">
  <!-- CSS -->
  <link rel="stylesheet" href="./style.css">
<title>ページのタイトル</title>
</head>
<body>
<header class="wiki-header">
    <div class="header-content">
        <div class="logo">トロイア語</div>
        <div class="header-right">
            <button class="mode-toggle">表示モード</button>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </div>
    <nav class="breadcrumb">
        <ul>
            <li><a href="#">メインページ</a></li>
            <li><a href="#">カテゴリ</a></li>
            <li>現在の記事</li>
        </ul>
    </nav>
</header>

<main id="content">
    <h1>記事のタイトル</h1>
    <p>これはWikipedia風のレイアウトです。<a href="#">リンク</a>はこのような色になります。</p>
    
    <div class="toc">
        <div class="toc-title">目次</div>
        <ul>
            <li><a href="#1">1 bar</a></li>
            <li>2 概要</li>
        </ul>
    </div>

    <h2 id="1">bar</h2>
    <p>セクションの内容がここに入ります。</p>
</main>
</body>
</html>
